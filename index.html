  --font-display: "Zen Maru Gothic", "Noto Sans JP", "Hiragino Maru Gothic ProN", system-ui, sans-serif;

:root[data-theme="dark"] {
  --bg-canvas:      #1F1C1A;
  --bg-muted:       #2A2624;
  --bg-emphasized:  #34302D;
  --bg-inverse:     var(--color-warm-50);

  --text-primary:   #F1ECE5;
  --text-secondary: #C9C0B5;
  --text-tertiary:  #8E847A;
  --text-disabled:  #5A524C;
  --text-inverse:   #1F1C1A;
  --text-brand:    var(--color-blue-300);

  --border-default:    #3A3431;
  --border-emphasized: #524A45;

  --action-primary:        var(--color-blue-400);
  --action-primary-hover:  var(--color-blue-300);
  --action-cta:            var(--color-peach-400);
  --action-cta-hover:      var(--color-peach-300);

  --focus-ring: 0 0 0 3px rgba(125, 157, 215, 0.40);

  --shadow-xs:  0 1px 2px rgba(0, 0, 0, 0.30);
  --shadow-sm:  0 2px 6px rgba(0, 0, 0, 0.35);
  --shadow-md:  0 6px 16px rgba(0, 0, 0, 0.40);
  --shadow-lg:  0 12px 28px rgba(0, 0, 0, 0.45);
  --shadow-xl:  0 20px 40px rgba(0, 0, 0, 0.50);
  --shadow-glow: 0 8px 24px rgba(248, 123, 87, 0.40);

  --btn-cta-text:     #FFFFFF;
  --btn-primary-text: #FFFFFF;

  & .quiz-progress {
    background: #3D3D33;
  }

  & .choice-num {
    background: #3D3D33;
    color: var(--text-secondary);
  }

  & .cat-row.selected {
    background: rgba(255, 255, 255, 0.06);
  }

  & .feedback {
    background: var(--bg-muted);
    border-color: var(--border-default);

    &.correct {
      background: rgba(170, 206, 56, 0.18);
      border-color: #AACE38;

      & strong { color: #C8E060; }
    }

    &.incorrect {
      background: rgba(235, 109, 85, 0.18);
      border-color: #EB6D55;

      & strong { color: #F58A75; }
    }
  }

  & .choice {
    &.correct {
      background: rgba(170, 206, 56, 0.16);
      border-color: #AACE38;
    }

    &.incorrect {
      background: rgba(235, 109, 85, 0.16);
      border-color: #EB6D55;
    }
  }

  & .review-mark {
    color: #C8E060;

    &.ng { color: #F58A75; }
  }

  & :is(.cta, .review-cta) {
    background: var(--bg-muted);
    border-color: var(--border-default);

    & .cta-summary {
      color: var(--text-primary);

      & .sep { color: var(--text-tertiary); }
    }
  }

  & .wb-toolbar input[type="search"]::placeholder {
    color: #6E665A;
  }

  & .kbd {
    background: var(--bg-muted);
    color: var(--text-secondary);
  }

  & .modal-backdrop {
    background: rgba(0, 0, 0, 0.6);
  }

  & .cat-progress-bar {
    background: var(--color-warm-700);
  }

  & :is(.options-row, .wb-toolbar) select {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='none' stroke='%23C9C0B5' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><polyline points='2,2 6,6 10,2'/></svg>");
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0ms !important;
    scroll-behavior: auto !important;
  }
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  background: var(--bg-canvas);
  color: var(--text-secondary);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 880px;
  margin: 0 auto;
  padding: var(--space-3) var(--space-4) var(--space-4);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;

  & > main {
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    display: flex;
  }
}

.screen { width: 100%; height: 100%; min-height: 0; }
:is(#screen-wordbook, #screen-quiz, #screen-result) {
  overflow-y: auto;
}
#screen-home {
  & > #home-content {
    height: 100%;
    min-height: 0;
  }
}
.home-grid {
  height: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(200px, 220px);
  gap: var(--space-3);
  min-height: 0;
}
.home-main, .home-side {
  min-height: 0;
  overflow-y: auto;
  padding-right: var(--space-2);
}
.home-main {
  & > * { margin-bottom: var(--space-3); }
  & > *:last-child { margin-bottom: 0; }
}
.home-side {
  & .history-block {
    max-height: 100%;
    display: flex;
    flex-direction: column;
    margin-bottom: 0;
    padding: var(--space-3) var(--space-3);

    & .history-list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      margin: 0;
      padding-right: var(--space-1);
      border-bottom: 1px solid var(--border-default);
      padding-bottom: var(--space-2);
      margin-bottom: var(--space-2);
    }

    & .data-actions {
      flex: 0 0 auto;
      padding-top: var(--space-3);
    }
  }
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  flex-wrap: wrap;
  padding-bottom: 10px;
  margin-bottom: var(--space-3);
  border-bottom: 1px solid var(--border-default);
}
.brand {
  font-family: var(--font-display);
  margin: 0;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-brand);
  line-height: 1.3;
  white-space: nowrap;
  letter-spacing: 0.01em;

  & em {
    font-family: var(--font-body);
    font-style: normal;
    color: var(--text-tertiary);
    font-weight: 400;
    font-size: 11px;
    margin-left: 6px;
  }
}
.app-actions { display: inline-flex; gap: var(--space-1); align-items: center; }
.link-btn {
  display: inline-flex;
  align-items: center;
  height: 32px;
  background: transparent;
  border: 0;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 12px;
  padding: 0 var(--space-3);
  cursor: pointer;
  font-weight: 500;
  white-space: nowrap;
  border-radius: var(--radius-sm);
  line-height: 1;
  transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);

  &:hover {
    color: var(--text-brand);
    background: var(--bg-muted);
  }

  &.active {
    color: var(--text-primary);
    font-weight: 700;
  }
}

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  padding: 0;
  background: transparent;
  border: 0;
  border-radius: var(--radius-pill);
  color: var(--text-secondary);
  cursor: pointer;
  transition: color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out);
  flex-shrink: 0;

  &:hover {
    color: var(--action-cta);
    background: var(--bg-muted);
  }

  &:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
  }
}

.theme-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 0;

  & svg { display: block; }
}

.user-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  height: 28px;
  padding: 0 10px;
  background: transparent;
  border: 1px solid var(--border-default);
  border-radius: 14px;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.15s, border-color 0.15s, color 0.15s;

  &:hover {
    background: var(--bg-muted);
    border-color: var(--border-emphasized);
    color: var(--text-primary);
  }

  &:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
  }
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 20, 20, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: var(--space-4);
}
.modal {
  background: var(--modal-bg);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  padding: var(--space-6) var(--space-6);
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow-xl);
}
.modal-title {
  font-family: var(--font-display);
  margin: 0 0 var(--space-2);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
}
.modal-desc {
  margin: 0 0 var(--space-4);
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-line;
}
.modal-input {
  width: 100%;
  height: 48px;
  padding: 0 var(--space-4);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-md);
  background: var(--input-bg);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 16px;
  margin-bottom: var(--space-5);
  transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);

  &:focus {
    outline: none;
    border-color: var(--input-border-focus);
    box-shadow: var(--focus-ring);
  }

  &::placeholder { color: var(--text-tertiary); }
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--space-2);

  & .btn {
    min-height: 44px;
    min-width: 104px;
    padding: 0 22px;
    border-radius: var(--radius-md);
  }

  & .btn:not(.btn-primary):not(.btn-danger) {
    background: var(--bg-muted);
    border-color: var(--border-default);
    color: var(--text-secondary);
    box-shadow: none;
  }

  & .btn:not(.btn-primary):not(.btn-danger):hover {
    background: var(--bg-emphasized);
    border-color: var(--border-emphasized);
    color: var(--text-primary);
  }

  & .btn[hidden] { display: none; }
}
.wb-row {
  background: transparent;
  border: 0;
  border-radius: 0;
  margin: 0;
  padding: var(--space-1) var(--space-2);
  display: grid;
  grid-template-columns: minmax(96px, auto) minmax(0, 1fr);
  column-gap: 10px;
  align-items: baseline;
  border-bottom: 1px dashed var(--border-default);

  &:hover { background: var(--bg-muted); }

  & .wb-word {
    font-family: var(--font-en);
    font-weight: 700;
    font-size: 12px;
    color: var(--text-primary);
    word-break: break-word;
    font-variant-numeric: tabular-nums lining-nums;
  }

  & .wb-meaning {
    color: var(--text-secondary);
    font-size: 12px;
    line-height: 1.5;
  }
}

.speak-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  padding: 0;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  color: var(--text-tertiary);
  cursor: pointer;
  vertical-align: middle;
  transition: color 0.15s, background 0.15s, border-color 0.15s;

  &:hover {
    color: var(--action-cta);
    background: var(--bg-muted);
  }

  &:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
  }

  & svg { display: block; }
}
.speak-btn-lg {
  width: 32px;
  height: 32px;

  & svg {
    width: 18px;
    height: 18px;
  }
}
.headword-row { display: inline-flex; align-items: center; gap: 10px; }

.block {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-xl);
  padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-3);
}

.section-title {
  font-family: var(--font-display);
  margin: 0 0 var(--space-2);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
}
.muted { color: var(--text-tertiary); font-size: 12px; margin: 0; }

.cta {
  background: var(--bg-muted);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.cta-summary {
  flex: 1 1 auto;
  min-width: 0;
  margin: 0;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

  & .sep {
    color: var(--text-tertiary);
    font-weight: 400;
    margin: 0 6px;
  }

  & .tk-mistake { color: var(--action-cta); }
}

.review-cta {
  background: var(--bg-muted);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  padding: var(--space-3) 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  flex-wrap: wrap;

  & .cta-summary {
    flex: 1 1 auto;
    min-width: 0;
  }
}

.result-note {
  text-align: center;
  font-size: 12px;
  color: var(--text-tertiary);
  margin: 6px 0 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 0 22px;
  border: 1px solid var(--btn-outline-border);
  border-radius: var(--radius-sm);
  background: var(--btn-outline-bg);
  color: var(--btn-outline-text);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
  white-space: nowrap;

  &:hover { background: var(--bg-muted); }

  &:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
  }

  &:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  &:disabled:hover { background: var(--btn-outline-bg); }
}
.btn-primary {
  background: var(--btn-cta-bg);
  color: var(--btn-cta-text);
  border-color: var(--btn-cta-bg);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);

  &:hover {
    background: var(--btn-cta-bg-hover);
    border-color: var(--btn-cta-bg-hover);
    color: var(--btn-cta-text);
    box-shadow: var(--shadow-md);
  }
}
.btn-danger {
  background: var(--btn-danger-bg);
  color: var(--btn-danger-text);
  border-color: var(--btn-danger-bg);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);

  &:hover {
    background: var(--btn-danger-bg-hover);
    border-color: var(--btn-danger-bg-hover);
    color: var(--btn-danger-text);
    box-shadow: var(--shadow-md);
  }
}
.btn-large { min-height: 48px; min-width: 11rem; padding: 0 28px; font-size: 15px; }
.btn-link {
  background: transparent;
  border: 0;
  color: var(--text-link);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 10px;
  cursor: pointer;
  font-family: inherit;
  border-radius: var(--radius-sm);
  min-height: auto;

  &:hover {
    color: var(--action-primary-hover);
    background: var(--color-blue-50);
  }

  &:disabled {
    color: var(--text-disabled);
    cursor: not-allowed;
    opacity: 0.6;
  }

  &:disabled:hover { background: transparent; }
}

.cat-list {
  margin: 0 0 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-default);
}
.cat-row {
  display: grid;
  grid-template-columns: 12px minmax(0, 1fr) 140px;
  gap: var(--space-2);
  align-items: center;
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--dur-fast) var(--ease-out);

  &:hover { background: var(--bg-muted); }

  &.selected {
    background: var(--color-warm-100);

    & .cat-mark::before { content: "●"; }
  }
}
.cat-mark {
  width: 14px;
  text-align: center;
  color: var(--action-cta);
  font-weight: 700;
  font-size: 11px;
}
.cat-name {
  min-width: 0;
  font-weight: 700;
  font-size: 14px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

  & .desc {
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 400;
    margin-left: 6px;
  }
}

.cat-progress { display: flex; flex-direction: column; gap: var(--space-1); min-width: 0; }
.cat-progress-meta {
  display: flex;
  gap: 6px;
  align-items: baseline;
  justify-content: flex-end;
  font-family: var(--font-en);
  font-size: 11px;
  font-variant-numeric: tabular-nums lining-nums;
}
.cat-progress-label {
  font-weight: 700;
  color: var(--text-primary);

  &.done { color: var(--state-success-solid); }
}
.cat-progress-total { color: var(--text-tertiary); }
.cat-progress-bar {
  height: 4px;
  background: var(--bg-emphasized);
  border-radius: var(--radius-pill);
  overflow: hidden;
}
.cat-progress-fill {
  height: 100%;
  background: var(--action-primary);
  border-radius: var(--radius-pill);
  transition: width var(--dur-base) var(--ease-out), background var(--dur-fast) var(--ease-out);

  &.done { background: var(--state-success-solid); }
}

.options-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
  font-size: 13px;
}
.options-row label {
  color: var(--text-secondary);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.options-row input[type="checkbox"] {
  accent-color: var(--action-cta);
  width: 14px;
  height: 14px;
}

:is(.options-row, .wb-toolbar) select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-color: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-md);
  padding: 6px 36px 6px 14px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='none' stroke='%236B6560' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><polyline points='2,2 6,6 10,2'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 12px 8px;

  &:focus {
    outline: none;
    border-color: var(--input-border-focus);
    box-shadow: var(--focus-ring);
  }
}
.history-list { margin: 0; }
.history-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  column-gap: var(--space-2);
  row-gap: 0;
  padding: var(--space-1) 0;
  border-bottom: 1px solid var(--border-default);
  font-size: 13px;

  &:last-child {
    border-bottom: 0;
    padding-bottom: 0;
  }
}
.history-cat {
  grid-column: 1;
  grid-row: 1;
  min-width: 0;
  color: var(--text-primary);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-stat {
  grid-column: 2;
  grid-row: 1;
  color: var(--action-cta);
  font-weight: 700;
  font-family: var(--font-en);
  font-variant-numeric: tabular-nums lining-nums;
  white-space: nowrap;
  font-size: 12px;
}
.history-date {
  grid-column: 1 / -1;
  grid-row: 2;
  color: var(--text-tertiary);
  font-family: var(--font-en);
  font-variant-numeric: tabular-nums lining-nums;
  font-size: 11px;
}
.history-empty { color: var(--text-tertiary); font-size: 13px; padding: 2px 0; }

.data-actions { margin-top: var(--space-2); display: flex; gap: 6px; flex-wrap: wrap; }


@layer component {
  .quiz-panel {
    width: 70%;
    max-width: 640px;
    min-width: 520px;
    margin-inline: auto;
  }
}
.quiz-progress {
  height: 3px;
  background: var(--color-warm-100);
  border-radius: var(--radius-pill);
  overflow: hidden;
  margin-bottom: var(--space-2);

  & > .fill {
    height: 100%;
    background: var(--action-cta);
    border-radius: var(--radius-pill);
    transition: width 0.3s;
  }
}
.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: var(--space-2);
  font-family: var(--font-en);
  font-variant-numeric: tabular-nums lining-nums;

  & .score {
    color: var(--text-secondary);
    font-weight: 500;
  }
}
.headword {
  font-family: var(--font-en);
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  margin: var(--space-3) 0 var(--space-1);
  letter-spacing: -0.01em;
  word-break: break-word;
  line-height: 1.15;
  color: var(--text-primary);
}
.headword-prompt {
  text-align: center;
  color: var(--text-tertiary);
  font-size: 13px;
  margin: 0 0 var(--space-3);
}

.choices { display: flex; flex-direction: column; gap: 6px; }
.choice {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card-bg);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  color: var(--text-primary);
  text-align: left;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  width: 100%;

  &:hover:not(:disabled) {
    background: var(--bg-muted);
    border-color: var(--action-cta);
  }

  &:focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
  }

  &:disabled { cursor: not-allowed; }

  &.correct {
    background: rgba(170, 206, 56, 0.18);
    border-color: #AACE38;
    border-width: 2px;
    padding: 7px 11px;

    & .choice-num {
      background: #AACE38;
      color: #FFFFFF;
    }
  }

  &.incorrect {
    background: rgba(235, 109, 85, 0.14);
    border-color: #EB6D55;
    border-width: 2px;
    padding: 7px 11px;
    color: var(--text-primary);

    & .choice-num {
      background: #EB6D55;
      color: #FFFFFF;
    }
  }
}
.choice-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: var(--radius-pill);
  background: var(--color-warm-100);
  color: var(--text-tertiary);
  font-family: var(--font-en);
  font-weight: 700;
  font-size: 11px;
  flex-shrink: 0;
}
.choice-text { flex: 1; min-width: 0; line-height: 1.4; }

.feedback {
  display: none;
  margin-top: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  font-size: 13px;
  background: var(--bg-muted);
  border: 1px solid var(--border-default);

  &.show { display: block; }

  &.correct {
    background: rgba(170, 206, 56, 0.16);
    border-color: #AACE38;
    color: var(--text-primary);

    & strong { color: #8FB82E; }
  }

  &.incorrect {
    background: rgba(235, 109, 85, 0.12);
    border-color: #EB6D55;
    color: var(--text-primary);

    & strong { color: #D95C47; }
  }

  & strong {
    font-weight: 700;
    margin-right: 6px;
  }
}

.quiz-actions {
  display: flex;
  justify-content: space-between;
  gap: var(--space-2);
  margin-top: 10px;
}
.kb-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 6px;
}
.kbd {
  display: inline-block;
  padding: 1px 7px;
  border: 1px solid var(--border-emphasized);
  border-radius: var(--radius-xs);
  font-family: var(--font-mono), var(--font-en);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg-muted);
  margin: 0 2px;
  line-height: 1.4;
}

.result-headline {
  font-family: var(--font-display);
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin: 0 0 var(--space-1);
  letter-spacing: 0.04em;
}
.result-rate {
  text-align: center;
  font-family: var(--font-en);
  font-size: 48px;
  font-weight: 700;
  color: var(--action-cta);
  margin: 0;
  font-variant-numeric: tabular-nums lining-nums;
  line-height: 1;
  letter-spacing: -0.02em;
}
.result-correct {
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  margin: var(--space-1) 0 0;
  font-family: var(--font-en);
  font-variant-numeric: tabular-nums lining-nums;
}
.review-list { margin: 0; }
.review-row {
  display: flex;
  gap: var(--space-2);
  padding: var(--space-1) 0;
  border-bottom: 1px solid var(--border-default);
  font-size: 13px;
  align-items: baseline;

  &:last-child {
    border-bottom: 0;
    padding-bottom: 0;
  }

  & > .review-body {
    flex: 1;
    min-width: 0;
  }
}
.review-mark {
  width: 18px;
  flex-shrink: 0;
  font-weight: 700;
  text-align: center;
  color: #8FB82E;

  &.ng { color: #EB6D55; }
}
.review-headword {
  font-family: var(--font-en);
  font-weight: 700;
  margin-right: 6px;
  color: var(--text-primary);
}

const shuffleArray = (arr) => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    return [
      ...DATA.prereq.map(x => ({ ...x, _kind: "meaning" })),
      ...DATA.basic.map(x => ({ ...x, _kind: "meaning" })),
      ...DATA.advanced.map(x => ({ ...x, _kind: "meaning" })),
      ...DATA.abbr.map(x => ({ ...x, _kind: "abbr" })),
      ...DATA.acronym.map(x => ({ ...x, _kind: "acronym" })),
    ];

  if (!cat) return [];

}

// ============================================================
// 出題生成
// ============================================================
// items: クイズ対象の語のリスト
// fullPool: 同一の_kindの全語（誤答抽出用）
//
// 略語・頭字語は専用ひっかけ候補と表記の近さで誤答を集めることで、
// 単純な頭文字消去法では正解が選べないようにしている。
const buildQuestion = (item, fullPool) => {
  const kind = item._kind;
  let prompt, answer, distractorPool;

  if (kind === "meaning") {
    prompt = "次の単語の意味として最も適切なものは？";
    answer = item.meaning;
    distractorPool = fullPool
      .filter(x => x._kind === "meaning")
      .filter(x => x.meaning !== answer)
      .map(x => ({ value: x.meaning, tier: 0 }));
  } else if (kind === "abbr") {
    prompt = "次の略語の元の英語表現として最も適切なものは？";
    answer = item.full;
    distractorPool = buildAbbrDistractorPool(item, fullPool);
  } else if (kind === "acronym") {
    prompt = "次の頭字語の正式名称として最も適切なものは？";
    answer = item.full;
    distractorPool = buildAcronymDistractorPool(item, fullPool);
  }

  const distractors = pickStratified(distractorPool, 3, answer);
  while (distractors.length < 3) {
    distractors.push("（候補不足）");
  }
  const choices = shuffleArray([answer, ...distractors]);
  const correctIndex = choices.indexOf(answer);

  return {
    word: item.word,
    prompt,
    choices,
    correctIndex,
    answer,
    kind,
  };
}

// 層別ピック: tier の小さい順に詰めていき、不足分を次の tier から補う。
// プールは [{value, tier}] の配列。
const pickStratified = (pool, n, answer) => {
  const seen = new Set([answer]);
  const tiers = {};
  for (const p of pool) {
    if (!p || typeof p.value !== "string") continue;
    if (!p.value.trim()) continue;
    if (seen.has(p.value)) continue;
    const t = typeof p.tier === "number" ? p.tier : 9;
    if (!tiers[t]) tiers[t] = [];
    tiers[t].push(p.value);
  }
  const sortedKeys = Object.keys(tiers).map(Number).sort((a, b) => a - b);
  const picked = [];
  for (const k of sortedKeys) {
    if (picked.length >= n) break;
    for (const v of shuffleArray(tiers[k])) {
      if (picked.length >= n) break;
      if (seen.has(v)) continue;
      seen.add(v);
      picked.push(v);
    }
  }
  return picked;
}

const _pushDistractorValues = (out, seen, values, tier) => {
  for (const value of values) {
    if (typeof value !== "string" || !value.trim()) continue;
    if (seen.has(value)) continue;
    seen.add(value);
    out.push({ value, tier });
  }
}

const _isSubsequence = (value, pattern) => {
  let i = 0;
  for (const ch of value) {
    if (ch === pattern[i]) i++;
    if (i >= pattern.length) return true;
  }
  return false;
}

const _isAbbrLikeCandidate = (value, abbr) => {
  const normalized = value.toLowerCase().replace(/[^a-z]/g, "");
  const key = abbr.toLowerCase().replace(/[^a-z]/g, "");
  return key.length > 0 && normalized.charAt(0) === key.charAt(0) && _isSubsequence(normalized, key);
}

const _phraseInitials = (value) => {
  return String(value)
    .split(/[\s/-]+/)
    .filter(Boolean)
    .map(part => {
      const internalCaps = part.slice(1).match(/[A-Z]/g);
      if (!internalCaps) return part.charAt(0).toUpperCase();
      if (/^[a-z]/.test(part)) return internalCaps.join("");
      return part.charAt(0).toUpperCase() + internalCaps.join("");
    })
    .join("");
}

const _commonPrefixLength = (a, b) => {
  const limit = Math.min(a.length, b.length);
  let i = 0;
  while (i < limit && a[i] === b[i]) i++;
  return i;
}

// 略語の誤答プール: 手動ひっかけ、接頭辞一致、略語文字列に近い候補、
// 同じ頭文字の略語 full の順で採用する。
const buildAbbrDistractorPool = (item, fullPool) => {
  const answer = item.full;
  const prefix = item.word.slice(0, Math.min(3, item.word.length)).toLowerCase();
  const out = [];
  const seen = new Set([answer]);
  _pushDistractorValues(out, seen, ABBR_DISTRACTOR_HINTS[item.word] ?? [], 0);
  const meaningWords = [
    ...(Array.isArray(DATA.prereq) ? DATA.prereq : []),
    ...(Array.isArray(DATA.basic) ? DATA.basic : []),
    ...(Array.isArray(DATA.advanced) ? DATA.advanced : []),
  ];
  for (const x of meaningWords) {
    if (typeof x.word !== "string") continue;
    const word = x.word;
    if (word.toLowerCase().startsWith(prefix)) {
      _pushDistractorValues(out, seen, [word], 1);
    } else if (_isAbbrLikeCandidate(word, item.word)) {
      _pushDistractorValues(out, seen, [word], 2);
    }
  }
  for (const x of fullPool) {
    if (x._kind !== "abbr" || x.full === answer) continue;
    const sameHead = x.full.charAt(0).toLowerCase() === answer.charAt(0).toLowerCase()
      || x.word.charAt(0).toLowerCase() === item.word.charAt(0).toLowerCase();
    _pushDistractorValues(out, seen, [x.full], sameHead ? 3 : 4);
  }
  return out;
}

// 頭字語の誤答プール: まず同じ頭字語形の専用候補を置き、
// データ内候補は頭文字列が近い順に補助で使う。
const buildAcronymDistractorPool = (item, fullPool) => {
  const answer = item.full;
  const acronym = item.word.toUpperCase();
  const out = [];
  const seen = new Set([answer]);
  _pushDistractorValues(out, seen, ACRONYM_DISTRACTOR_HINTS[acronym] ?? [], 0);
  for (const x of fullPool) {
    if (x._kind !== "acronym" || x.full === answer) continue;
    const score = _commonPrefixLength(_phraseInitials(x.full), acronym);
    const tier = score >= Math.min(2, acronym.length) ? 1 : (score > 0 ? 2 : 3);
    _pushDistractorValues(out, seen, [x.full], tier);
  }
  return out;
}

// ============================================================
const requestToPromise = request => new Promise((resolve, reject) => {
  request.onsuccess = () => resolve(request.result);
  request.onerror = () => reject(request.error);
});

const openDB = async () => {
  if (typeof indexedDB === "undefined") {
    throw new Error("IndexedDB is unavailable");
  }

  const request = indexedDB.open(DB_NAME, DB_SCHEMA);
  request.onupgradeneeded = () => {
    const db = request.result;
    if (!db.objectStoreNames.contains(STORE_NAME)) {
      db.createObjectStore(STORE_NAME, { keyPath: "key" });
    }
  };
  return requestToPromise(request);
}

const withStore = async (mode, action) => {
  const db = await openDB();
  const tx = db.transaction(STORE_NAME, mode);
  return requestToPromise(action(tx.objectStore(STORE_NAME)));
}

const idbGet = async key => {
  const result = await withStore("readonly", store => store.get(key));
  return result?.value;
}

const idbSet = async (key, value) => {
  await withStore("readwrite", store => store.put({ key, value }));
}

const idbDelete = async key => {
  await withStore("readwrite", store => store.delete(key));
}

const loadAllFromIDB = async () => {
  try {
    const lastActivityAt = await idbGet("lastActivityAt");
    // 2週間経過していたらユーザー名以外を破棄
    if (typeof lastActivityAt === "number" && Date.now() - lastActivityAt > IDB_TTL_MS) {
      const preservedUserName = await idbGet("userName");
      try {
        await idbDelete("theme");
        await idbDelete("history");
        await idbDelete("selection");
        await idbDelete("wordStats");
        await idbDelete("lastActivityAt");
      } catch (e) {}
      dataCache.theme = null;
      dataCache.history = [];
      dataCache.lastSelection = null;
      dataCache.wordStats = {};
      dataCache.userName = (typeof preservedUserName === "string" && preservedUserName.trim()) ? preservedUserName : null;
      dataCache.lastActivityAt = null;
      return;
    }
    const theme = await idbGet("theme");
    const history = await idbGet("history");
    const selection = await idbGet("selection");
    const wordStats = await idbGet("wordStats");
    const userName = await idbGet("userName");
    dataCache.theme = theme ?? null;
    dataCache.history = normalizeHistory(history);
    dataCache.lastSelection = (selection && typeof selection === "object") ? selection : null;
    dataCache.wordStats = (wordStats && typeof wordStats === "object" && !Array.isArray(wordStats)) ? wordStats : {};
    dataCache.userName = (typeof userName === "string" && userName.trim()) ? userName : null;
    dataCache.lastActivityAt = (typeof lastActivityAt === "number") ? lastActivityAt : null;
  } catch (e) {
    dataCache.theme = null;
    dataCache.history = [];
    dataCache.lastSelection = null;
    dataCache.wordStats = {};
    dataCache.userName = null;
    dataCache.lastActivityAt = null;
  }
}

const saveUserName = async (name) => {
  const trimmed = String(name ?? "").trim().slice(0, 30);
  dataCache.userName = trimmed || null;
  try {
    if (dataCache.userName) await idbSet("userName", dataCache.userName);
    else await idbDelete("userName");
  } catch (e) {
  }
  await touchActivity();
}

const normalizeHistorySession = (session) => {
  if (!session || typeof session !== "object" || Array.isArray(session)) return null;
  const timestamp = Number(session.timestamp);
  const total = Number(session.total);
  const correct = Number(session.correct);
  if (!Number.isFinite(timestamp) || timestamp <= 0) return null;
  if (!Number.isInteger(total) || total <= 0) return null;
  if (!Number.isInteger(correct) || correct < 0 || correct > total) return null;

  const category = getCategoryById(session.categoryId);
  const categoryId = session.categoryId === "mistake" || CATEGORIES.some(c => c.id === session.categoryId)
    ? session.categoryId
    : category.id;
  const fallbackLabel = session.categoryId === "mistake" ? "苦手復習" : category.label;
  const categoryLabel = typeof session.categoryLabel === "string" && session.categoryLabel.trim()
    ? session.categoryLabel.trim().slice(0, 80)
    : fallbackLabel;

  return { timestamp, categoryId, categoryLabel, total, correct };
}

const normalizeHistory = (history) => {
  if (!Array.isArray(history)) return [];
  return history
    .map(normalizeHistorySession)
    .filter(Boolean)
    .slice(0, 30);
}

const recordHistorySession = async (session) => {
  const normalized = normalizeHistorySession(session);
  if (!normalized) return;
  dataCache.history.unshift(normalized);
  dataCache.history = normalizeHistory(dataCache.history);
  try {
    await idbSet("history", dataCache.history);
  } catch (e) {
  }
  touchActivity();
}

let wordStatsPersistenceVersion = 0;

const cloneWordStats = () => {
  const source = dataCache.wordStats && typeof dataCache.wordStats === "object" && !Array.isArray(dataCache.wordStats)
    ? dataCache.wordStats
    : {};
  return Object.fromEntries(
    Object.entries(source)
      .filter(([, value]) => value && typeof value === "object" && !Array.isArray(value))
      .map(([key, value]) => [key, { ...value }])
  );
}

const saveWordStatsSnapshot = async (snapshot) => {
  if (Object.keys(snapshot).length > 0) await idbSet("wordStats", snapshot);
  else await idbDelete("wordStats");
}

const persistWordStats = async () => {
  const version = wordStatsPersistenceVersion;
  const snapshot = cloneWordStats();
  try {
    await saveWordStatsSnapshot(snapshot);
    if (version !== wordStatsPersistenceVersion) {
      await saveWordStatsSnapshot(cloneWordStats());
    }
  } catch (e) {
  }
  touchActivity();
}

const clearHistoryData = async () => {
  wordStatsPersistenceVersion++;
  dataCache.history = [];
  dataCache.wordStats = {};
  try {
    await idbDelete("history");
    await idbDelete("wordStats");
  } catch (e) {
  }
  touchActivity();
}

const clearAllData = async () => {
  // ユーザー名はあえて保持する（再入力を強制しない）
  const preservedUserName = dataCache.userName;
  wordStatsPersistenceVersion++;
  dataCache.theme = null;
  dataCache.history = [];
  dataCache.wordStats = {};
  dataCache.lastActivityAt = null;
  dataCache.lastSelection = null;
  try {
    // 個別の鍵だけ削除し、userName は残す
    await idbDelete("theme");
    await idbDelete("history");
    await idbDelete("wordStats");
    await idbDelete("selection");
    await idbDelete("lastActivityAt");
  } catch (e) {
  }
  // ユーザー名はキャッシュ側でも保持
  dataCache.userName = preservedUserName;
  // 直近のアクティビティ時刻は更新しておく（TTLクロックをリセット）
  await touchActivity();
}

// ============================================================
// 苦手復習: 単語ごとの正誤統計
// ============================================================
const statKey = (word, kind) => {
  return (kind ?? "meaning") + ":" + word;
}
const recordAnswerStat = (word, kind, isCorrect) => {
  wordStatsPersistenceVersion++;
  const key = statKey(word, kind);
  const stats = dataCache.wordStats || (dataCache.wordStats = {});
  const cur = stats[key] || { wrong: 0, right: 0, lastResult: null };
  if (isCorrect) {
    cur.right++;
    cur.lastResult = "correct";
  } else {
    cur.wrong++;
    cur.lastResult = "incorrect";
  }
  cur.lastTs = Date.now();
  stats[key] = cur;
  // fire-and-forget
  persistWordStats();
}
// 「直近で間違えた、または過去に間違えたことがあって今は正解している語の中でも継続フォロー中」
// シンプル版: lastResult === "incorrect" の語を「苦手」として扱う
const getMistakeItems = () => {
  const stats = dataCache.wordStats ?? {};
  const all = getCategorySource("all");
  return all.filter(item => {
    const key = statKey(item.word, item._kind);
    const s = stats[key];
    return s?.lastResult === "incorrect";
  });
}

// DOM ヘルパー

const el = (tag, attrs, children) => {
  const element = document.createElement(tag);

  for (const [key, value] of Object.entries(attrs ?? {})) {
    if (value === false || value == null) continue;

    if (key === "class") element.className = value;
    else if (key === "style" && typeof value === "object") Object.assign(element.style, value);
    else if (key === "dataset" && typeof value === "object") Object.assign(element.dataset, value);
    else if (value === true) element.setAttribute(key, "");
    else element.setAttribute(key, value);
  }

  appendChildren(element, children);
  return element;
}
const appendChildren = (parent, children) => {
  if (children == null) return;
  for (const child of Array.isArray(children) ? children : [children]) {
    if (child == null || child === false) continue;
    if (typeof child === "string" || typeof child === "number") {
      parent.appendChild(document.createTextNode(String(child)));
    } else {
      parent.appendChild(child);
    }
  }
}

const setSvgIcon = (target, svg) => {
  const icon = new DOMParser().parseFromString(svg, "image/svg+xml").documentElement;
  target.replaceChildren(icon);
}

const actionButton = (attrs, children, onClick) => {
  const button = el("button", attrs, children);
  button.addEventListener("click", onClick);
  return button;
}

// 日付の整形 (例: 2026-05-01)
const fmtDate = (ts) => {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

// ============================================================
// HTML エクスポート（印刷・閲覧・共有が容易な形式）
// ============================================================
const htmlEscape = (v) => {
  return String(v == null ? "" : v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
const downloadFile = (filename, content, mime) => {
  const blob = new Blob([content], { type: (mime || "text/plain") + ";charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
const fmtDateTime = (ts) => {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
const fmtFileStamp = (ts) => {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;
}
const kindLabel = (kind) => {
  if (kind === "abbr") return "略語";
  if (kind === "acronym") return "頭字語";
  return "意味";
}

  const totalQuestions = sorted.reduce((s, x) => s + x.total, 0);
  const totalCorrect   = sorted.reduce((s, x) => s + x.correct, 0);
  const avgRate = totalQuestions ? Math.round(totalCorrect / totalQuestions * 100) : 0;
  const rows = sorted.map(s => {
    const rate = Math.round(s.correct / s.total * 100);
    return `<tr>
      <td>${htmlEscape(fmtDateTime(s.timestamp))}</td>
      <td>${htmlEscape(s.categoryLabel)}</td>
      <td class="num">${s.total}</td>
      <td class="num">${s.correct}</td>
      <td class="num">${rate}%</td>
    </tr>`;
  }).join("");
  const html = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MustDevEigo 学習履歴 ${tsStr}</title>
<style>${REPORT_STYLE}</style>
</head>
<body>
<div class="doc">
  <h1>${dataCache.userName ? htmlEscape(dataCache.userName) + " さんの " : ""}MustDevEigo 学習履歴</h1>
  <p class="sub">${htmlEscape(tsStr)} 時点</p>
  <p class="rate-big">${avgRate}%</p>
  <dl class="meta">
    ${dataCache.userName ? `<dt>受験者</dt><dd>${htmlEscape(dataCache.userName)} さん</dd>` : ""}
    <dt>セッション数</dt><dd>${sorted.length}</dd>
    <dt>累計問題数</dt><dd>${totalQuestions}</dd>
    <dt>累計正解数</dt><dd>${totalCorrect}</dd>
    <dt>平均正答率</dt><dd>${avgRate}%</dd>
  </dl>
  <table>
    <thead>
      <tr><th>日時</th><th>分野</th><th style="width:80px;">問題数</th><th style="width:80px;">正解数</th><th style="width:80px;">正答率</th></tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
  <footer>MustDevEigo · ${htmlEscape(tsStr)}</footer>
</div>
</body>
</html>`;
  const filename = `MustDevEigo_history_${fmtFileStamp(ts)}.html`;
  downloadFile(filename, html, "text/html");
}

const getCategoryById = (id) => {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES.find(c => c.id === "basic");
}

const DEFAULT_SELECTION = { catId: "basic", count: "20", shuffle: true, unseenOnly: true };
const VALID_QUESTION_COUNTS = new Set(["10", "20", "30", "50", "all"]);

const normalizeSelection = (sel) => {
  const raw = (sel && typeof sel === "object") ? sel : {};
  const catId = CATEGORIES.some(c => c.id === raw.catId) ? raw.catId : DEFAULT_SELECTION.catId;
  const count = VALID_QUESTION_COUNTS.has(String(raw.count)) ? String(raw.count) : DEFAULT_SELECTION.count;
  return {
    catId,
    count,
    shuffle: typeof raw.shuffle === "boolean" ? raw.shuffle : DEFAULT_SELECTION.shuffle,
    unseenOnly: typeof raw.unseenOnly === "boolean" ? raw.unseenOnly : DEFAULT_SELECTION.unseenOnly,
  };
}

// 直近選択
const getLastSelection = () => {
  // 未出題のみは初回起動時 ON。同じ語が繰り返し出題されないようにする初期方針。
  return normalizeSelection(dataCache.lastSelection);
}
const saveLastSelection = (sel) => {
  const normalized = normalizeSelection(sel);
  dataCache.lastSelection = normalized;
  idbSet("selection", normalized).catch(() => {});
  touchActivity();
}

// 未出題語: wordStats にキーが無い語＝過去に解答していない語
const getUnseenItems = (catId) => {
  const stats = dataCache.wordStats ?? {};
  return getCategorySource(catId).filter(item => !stats[statKey(item.word, item._kind)]);
}

// 単語帳ビューの状態
const wbState = { catId: "all", search: "" };
let lastFinishedInfo = null;

// ============================================================
// 画面切り替え
// ============================================================
const showScreen = (name) => {
  for (const id of ["screen-home", "screen-wordbook", "screen-quiz", "screen-result"]) {
    byId(id).classList.toggle("hidden", id !== "screen-" + name);
  }
  byId("nav-home").classList.toggle("active", name === "home" || name === "quiz" || name === "result");
  byId("nav-wordbook").classList.toggle("active", name === "wordbook");
  if (name === "home") renderHome();
  if (name === "wordbook") renderWordbook();
}

// ============================================================
// ホーム（演習中心）
// ============================================================
const renderHome = () => {
  const root = byId("home-content");
  root.replaceChildren();
  const sel = getLastSelection();
  const cat = getCategoryById(sel.catId);

  // 8:2 グリッドのコンテナ。左に演習導線、右に履歴を配置。
  const grid = el("div", { class: "home-grid" });
  const main = el("div", { class: "home-main" });
  const side = el("div", { class: "home-side" });

  // === 左: 演習開始 CTA ===
  const startBtn = el("button", { class: "btn btn-primary btn-large", id: "start-btn", type: "button" }, "演習を始める");
  startBtn.addEventListener("click", () => startQuiz());
  const cta = el("div", { class: "cta" }, [
    el("p", { class: "cta-summary" }, [
      cat.label,
      el("span", { class: "sep" }, "·"),
      sel.count === "all" ? "全問" : (sel.count + "問"),
      el("span", { class: "sep" }, "·"),
      sel.shuffle ? "シャッフル" : "順番",
      sel.unseenOnly ? el("span", { class: "sep" }, "·") : null,
      sel.unseenOnly ? "未出題のみ" : null,
    ]),
    startBtn,
  ]);
  main.appendChild(cta);

  // === 左: 苦手復習 （苦手語が1件以上ある場合のみ表示） ===
  const mistakes = getMistakeItems();
  if (mistakes.length > 0) {
    const reviewBtn = el("button", { class: "btn btn-primary btn-large", type: "button" }, "苦手だけ演習する");
    reviewBtn.addEventListener("click", () => startMistakeQuiz());
    const reviewCard = el("div", { class: "review-cta" }, [
      el("p", { class: "cta-summary" }, [
        el("span", { class: "tk-mistake" }, mistakes.length + " 語"),
        el("span", { class: "sep" }, "·"),
        "直近で間違えた語",
      ]),
      reviewBtn,
    ]);
    main.appendChild(reviewCard);
  }

  // === 左: カテゴリー選択 + 設定 ===
  const catCard = el("div", { class: "block" }, [
    el("p", { class: "section-title" }, "出題する分野を選ぶ"),
  ]);
  const catList = el("div", { class: "cat-list" });
  for (const c of CATEGORIES) {
    const items = getCategorySource(c.id);
    const total = items.length;
    const unseen = getUnseenItems(c.id).length;
    const seen = total - unseen;
    const pct = total > 0 ? Math.round((seen / total) * 100) : 0;
    const done = total > 0 && unseen === 0;
    const isSel = c.id === sel.catId;
    const row = el("div", {
      class: "cat-row" + (isSel ? " selected" : ""),
      dataset: { catId: c.id },
    }, [
      el("span", { class: "cat-mark" }),
      el("span", { class: "cat-name" }, [
        c.label,
        el("span", { class: "desc" }, c.desc),
      ]),
      el("div", { class: "cat-progress" }, [
        el("div", { class: "cat-progress-meta" }, [
          el("span", { class: "cat-progress-label" + (done ? " done" : "") },
             done ? "全制覇" : ("残り " + unseen)),
          el("span", { class: "cat-progress-total" }, "/ " + total + " 語"),
        ]),
        el("div", { class: "cat-progress-bar" }, [
          el("div", { class: "cat-progress-fill" + (done ? " done" : ""), style: { width: pct + "%" } }),
        ]),
      ]),
    ]);
    row.addEventListener("click", () => {
      saveLastSelection({ catId: c.id, count: sel.count, shuffle: sel.shuffle, unseenOnly: sel.unseenOnly });
      renderHome();
    });
    catList.appendChild(row);
  }
  catCard.appendChild(catList);

  // オプション
  const qcountSelect = el("select", { id: "qcount-select" }, [
    el("option", { value: "10" }, "10問"),
    el("option", { value: "20" }, "20問"),
    el("option", { value: "30" }, "30問"),
    el("option", { value: "50" }, "50問"),
    el("option", { value: "all" }, "全問"),
  ]);
  qcountSelect.value = sel.count;
  qcountSelect.addEventListener("change", () => {
    saveLastSelection({ catId: sel.catId, count: qcountSelect.value, shuffle: sel.shuffle, unseenOnly: sel.unseenOnly });
    renderHome();
  });
  const shuffleCheck = el("input", { type: "checkbox", id: "shuffle-check", checked: sel.shuffle });
  shuffleCheck.addEventListener("change", () => {
    saveLastSelection({ catId: sel.catId, count: sel.count, shuffle: shuffleCheck.checked, unseenOnly: sel.unseenOnly });
    renderHome();
  });
  const unseenCheck = el("input", { type: "checkbox", id: "unseen-check", checked: sel.unseenOnly });
  unseenCheck.addEventListener("change", () => {
    saveLastSelection({ catId: sel.catId, count: sel.count, shuffle: sel.shuffle, unseenOnly: unseenCheck.checked });
    renderHome();
  });
  catCard.appendChild(el("div", { class: "options-row" }, [
    el("label", null, ["出題数 ", qcountSelect]),
    el("label", null, [shuffleCheck, " 順番をシャッフル"]),
    el("label", null, [unseenCheck, " 未出題のみ"]),
  ]));
  main.appendChild(catCard);

  // === 右: 直近の記録（内側スクロール） ===
  const histCard = el("div", { class: "block history-block" }, [
    el("p", { class: "section-title" }, "直近の記録"),
  ]);
  const history = normalizeHistory(dataCache.history);
  dataCache.history = history;
  if (!history.length) {
    histCard.appendChild(el("p", { class: "history-empty" }, "まだ記録がありません。"));
  } else {
    const list = el("div", { class: "history-list" });
    for (const s of history) {
      const rate = Math.round(s.correct / s.total * 100);
      list.appendChild(el("div", { class: "history-row" }, [
        el("span", { class: "history-date" }, fmtDate(s.timestamp)),
        el("span", { class: "history-cat" }, s.categoryLabel),
        el("span", { class: "history-stat" }, `${s.correct}/${s.total} · ${rate}%`),
      ]));
    }
    histCard.appendChild(list);
  }

  // データアクション（保存・削除）
  const exportHist = el("button", { class: "btn-link", type: "button" }, "履歴をHTMLで保存");
  exportHist.disabled = !history.length;
  exportHist.addEventListener("click", exportHistoryHTML);
  const delHistory = el("button", { class: "btn-link", type: "button" }, "履歴と苦手データを削除");
  delHistory.disabled = !(history.length || Object.keys(dataCache.wordStats || {}).length);
  delHistory.addEventListener("click", async () => {
    if (!(history.length || Object.keys(dataCache.wordStats || {}).length)) return;
    const confirmed = await showConfirm({
      title: "履歴と苦手データを削除",
      body: "学習履歴と苦手記録をすべて削除します。",
      confirmLabel: "削除する",
      danger: true,
    });
    if (!confirmed) return;
    await clearHistoryData();
    renderHome();
  });
  const delAll = el("button", { class: "btn-link", type: "button" }, "すべての保存データを削除");
  delAll.disabled = !(history.length || dataCache.theme || dataCache.lastSelection || Object.keys(dataCache.wordStats || {}).length);
  delAll.addEventListener("click", async () => {
    const confirmed = await showConfirm({
      title: "保存データを削除",
      body: "テーマ・履歴・苦手記録・直近の選択を含む保存データを削除します。\nお名前は引き続き保持されます。",
      confirmLabel: "削除する",
      danger: true,
    });
    if (!confirmed) return;
    await clearAllData();
    applyThemeUI("light");
    renderHome();
  });
  histCard.appendChild(el("div", { class: "data-actions" }, [exportHist, delHistory, delAll]));
  side.appendChild(histCard);

  grid.appendChild(main);
  grid.appendChild(side);
  root.appendChild(grid);
}

    ...CATEGORIES.filter(c => c.id !== "all").map(c => el("option", { value: c.id }, c.label)),

      actionButton({ class: "btn", type: "button" }, "← 演習に戻る", () => showScreen("home")),

const renderWordbookList = () => {
  const listEl = byId("wb-list");
  const sumEl = byId("wb-summary");
  if (!listEl || !sumEl) return;
  listEl.replaceChildren();

  const source = getCategorySource(wbState.catId);
  // 表示用の値を作りつつ、検索後の描画で元データを参照できるよう item も残す。
  const rows = source.map(item => {
    let display;
    if (item._kind === "abbr") display = item.full + "（の略）";
    else if (item._kind === "acronym") display = item.full;
    else display = item.meaning;
    return { word: item.word, display, item };
  });

  // 検索フィルタ
  const q = wbState.search.trim().toLowerCase();
  const filtered = q ? rows.filter(r =>
    r.word.toLowerCase().includes(q) || r.display.toLowerCase().includes(q)
  ) : rows;

  // 単語アルファベット順にソート
  filtered.sort((a, b) => a.word.localeCompare(b.word));

  sumEl.replaceChildren();
  sumEl.appendChild(document.createTextNode("表示中: "));
  sumEl.appendChild(el("strong", null, String(filtered.length)));
  sumEl.appendChild(document.createTextNode(" / 全 "));
  sumEl.appendChild(el("strong", null, String(rows.length)));
  sumEl.appendChild(document.createTextNode(" 語"));

  if (filtered.length === 0) {
    listEl.appendChild(el("div", { class: "wb-empty" }, "該当する単語が見つかりません。"));
    return;
  }

  for (const r of filtered) {
    const row = el("div", { class: "wb-row" }, [
      el("div", { class: "wb-word" }, [
        el("span", { class: "headword-row" }, [
          el("span", null, r.word),
          makeSpeakButton(r.word),
        ]),
      ]),
      el("div", { class: "wb-meaning" }, r.display),
    ]);
    listEl.appendChild(row);
  }
}

// ============================================================
// 演習開始
// ============================================================
const startQuiz = (override) => {
  const sel = normalizeSelection(override || getLastSelection());
  const source = getCategorySource(sel.catId);
  if (source.length === 0) {
    showNotice("この分野には出題できる語がありません。別の分野を選んでください。", "出題できません");
    return;
  }
  // 未出題のみフィルタ: wordStats にキーが無い語だけを残す。
  // 誤答プールは未フィルタの全語から取り、選択肢の質を保つ。
  let pool = source;
  if (sel.unseenOnly) {
    const stats = dataCache.wordStats ?? {};
    pool = source.filter(item => !stats[statKey(item.word, item._kind)]);
    if (pool.length === 0) {
      showNotice("この分野は全て出題済みです。\n「未出題のみ」を外すか、ホーム画面で履歴と苦手データを削除してください。", "未出題なし");
      return;
    }
  }
  const ordered = sel.shuffle ? shuffleArray(pool) : pool.slice();
  const limit = sel.count === "all" ? ordered.length : Math.min(Number.parseInt(sel.count, 10), ordered.length);
  const items = ordered.slice(0, limit);

  state.questions = items.map(item => buildQuestion(item, source));
  state.currentIdx = 0;
  state.correctCount = 0;
  state.answers = [];
  state.awaitingNext = false;
  state.finishing = false;
  state.finished = false;
  state.autoSpokenQuestionKey = null;
  state.selectedCategory = sel.catId;
  state.mistakeMode = false;
  saveLastSelection({ catId: sel.catId, count: sel.count, shuffle: sel.shuffle, unseenOnly: sel.unseenOnly });

  showScreen("quiz");
  renderQuestion();
}

// 苦手だけを出題する（誤答リストから抽出）
const startMistakeQuiz = () => {
  const mistakes = getMistakeItems();
  if (mistakes.length === 0) {
    showNotice("苦手として記録された単語はまだありません。演習で間違えた語が苦手リストに追加されます。", "苦手はまだありません");
    return;
  }
  const allSource = getCategorySource("all");
  const ordered = shuffleArray(mistakes);
  state.questions = ordered.map(item => buildQuestion(item, allSource));
  state.currentIdx = 0;
  state.correctCount = 0;
  state.answers = [];
  state.awaitingNext = false;
  state.finishing = false;
  state.finished = false;
  state.autoSpokenQuestionKey = null;
  state.selectedCategory = "mistake";
  state.mistakeMode = true;

  showScreen("quiz");
  renderQuestion();
}

// ============================================================
// 出題
// ============================================================
const renderQuestion = () => {
  const q = state.questions[state.currentIdx];
  const $root = qs("#quiz-content");
  $root.replaceChildren();
  state.awaitingNext = false;

  const pct = (state.currentIdx / state.questions.length) * 100;
  const $choices = el("div", { class: "choices" });
  $choices.addEventListener("click", event => {
    const $choice = event.target instanceof Element ? event.target.closest(".choice") : null;
    if (!$choice || !$choices.contains($choice)) return;
    handleChoice(Number($choice.dataset.idx));
  });
  for (const [index, choice] of q.choices.entries()) {
    $choices.appendChild(el("button", { class: "choice", type: "button", dataset: { idx: String(index) } }, [
      el("span", { class: "choice-num" }, String(index + 1)),
      el("span", { class: "choice-text" }, choice),
    ]));
  }

  const $card = el("div", { class: "block quiz-panel" }, [
    el("div", { class: "quiz-progress" }, [
      el("div", { class: "fill", style: { width: pct + "%" } }),
    ]),
    el("div", { class: "quiz-meta" }, [
      el("span", null, `第 ${state.currentIdx + 1} 問 / 全 ${state.questions.length} 問`),
      el("span", { class: "score" }, `正解 ${state.correctCount} / ${state.answers.length}`),
    ]),
    el("div", { class: "headword" }, [
      el("span", { class: "headword-row" }, [
        el("span", null, q.word),
        makeSpeakButton(q.word, { size: "lg" }),
      ]),
    ]),
    el("p", { class: "headword-prompt" }, q.prompt),
    $choices,
    el("div", { class: "feedback", id: "feedback" }),
    el("div", { class: "quiz-actions" }, [
      actionButton({ class: "btn", id: "quit-btn", type: "button" }, "中断", async () => {
        if (state.answers.length === 0 || (await showConfirm({
          title: "演習を中断",
          body: "演習を中断してホームに戻りますか？",
          confirmLabel: "中断する",
          danger: true,
        }))) {
          showScreen("home");
        }
      }),
      actionButton({ class: "btn btn-primary", id: "next-btn", type: "button", disabled: true }, "次の問へ", goNext),
    ]),
    el("p", { class: "kb-hint" }, [
      el("span", { class: "kbd" }, "1"),
      "〜",
      el("span", { class: "kbd" }, "4"),
      "で選択 / ",
      el("span", { class: "kbd" }, "5"),
      "で発音 / ",
      el("span", { class: "kbd" }, "Enter"),
      "で次へ",
    ]),
  ]);
  $root.appendChild($card);
  playQuestionAudioOnce(q);
}

// ============================================================
// 解答処理
// ============================================================
const handleChoice = (idx) => {
  if (state.awaitingNext) return;
  const q = state.questions[state.currentIdx];
  const isCorrect = idx === q.correctIndex;
  if (isCorrect) state.correctCount++;
  state.answers.push({ word: q.word, picked: idx, correct: q.correctIndex, isCorrect, answer: q.answer, choices: q.choices, kind: q.kind });
  state.awaitingNext = true;
  // 単語別の正誤を記録（苦手復習で利用）
  recordAnswerStat(q.word, q.kind, isCorrect);

  for (const [$index, $button] of qsa("#quiz-content .choice").entries()) {
    $button.disabled = true;
    if ($index === q.correctIndex) $button.classList.add("correct");
    else if ($index === idx) $button.classList.add("incorrect");
  }

  const $feedback = qs("#feedback");
  if ($feedback) {
    $feedback.replaceChildren();
    $feedback.classList.add("show", isCorrect ? "correct" : "incorrect");
    $feedback.appendChild(el("strong", null, isCorrect ? "正解" : "不正解"));
    $feedback.appendChild(document.createTextNode("  "));
    $feedback.appendChild(document.createTextNode(q.word + " ＝ " + q.answer));
  }

  const $meta = qs("#quiz-content .quiz-meta .score");
  if ($meta) $meta.textContent = `正解 ${state.correctCount} / ${state.answers.length}`;

  const $nextBtn = qs("#next-btn");
  if ($nextBtn) { $nextBtn.disabled = false; $nextBtn.focus(); }
}

// ============================================================
// 次へ / 終了
// ============================================================
const goNext = () => {
  if (!state.awaitingNext || state.finishing || state.finished) return;
  state.currentIdx++;
  if (state.currentIdx >= state.questions.length) {
    state.awaitingNext = false;
    state.finishing = true;
    finishQuiz();
  } else {
    renderQuestion();
  }
}

const finishQuiz = async () => {
  if (state.finished) return;
  state.finishing = true;
  state.finished = true;
  const total = state.answers.length;
  const correct = state.correctCount;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  const isMistake = state.mistakeMode === true;
  let cat;
  if (isMistake) cat = { id: "mistake", label: "苦手復習", desc: "" };
  else           cat = getCategoryById(state.selectedCategory);

  await recordHistorySession({
    timestamp: Date.now(),
    categoryId: cat.id,
    categoryLabel: cat.label,
    total,
    correct,
  });

  // 苦手復習モードでの「克服した語」をカウント
  const resolved = isMistake ? state.answers.filter(answer => answer.isCorrect).length : 0;

  lastFinishedInfo = { total, correct, rate, cat, isMistake, resolved };
  renderResult();
}

const renderResult = () => {
  const root = byId("result-content");
  root.replaceChildren();
  const info = lastFinishedInfo;

  const summary = el("div", { class: "block" }, [
    el("p", { class: "result-headline" }, info.cat.label + " の結果"),
    el("p", { class: "result-rate" }, info.rate + "%"),
    el("p", { class: "result-correct" }, `${info.correct} / ${info.total} 問 正解`),
    info.isMistake ? el("p", { class: "result-note" }, info.resolved + " 語を克服 · 残った苦手は次回も出題されます") : null,
  ]);
  root.appendChild(summary);

  const reviewCard = el("div", { class: "block" }, [
    el("p", { class: "section-title" }, "振り返り"),
  ]);
  const list = el("div", { class: "review-list" });
  for (const a of state.answers) {
    list.appendChild(el("div", { class: "review-row" }, [
      el("span", { class: "review-mark " + (a.isCorrect ? "ok" : "ng") }, a.isCorrect ? "○" : "×"),
      el("span", { class: "review-body" }, [
        el("span", { class: "review-headword" }, a.word),
        el("span", { class: "review-meaning" }, "＝ " + a.answer),
        a.isCorrect ? null : el("span", { class: "review-picked" }, a.choices[a.picked] || "—"),
      ]),
    ]));
  }
  reviewCard.appendChild(list);
  root.appendChild(reviewCard);

  const isMistake = info.isMistake;
  const actions = el("div", { class: "result-actions" }, [
    actionButton({ class: "btn", type: "button" }, "← ホームに戻る", () => showScreen("home")),
    actionButton({ class: "btn btn-primary", type: "button" }, isMistake ? "苦手をもう一度" : "もう一度", () => {
      if (isMistake) startMistakeQuiz();
      else startQuiz();
    }),
  ]);
  root.appendChild(actions);

  // 補助リンク
  const subActions = el("div", { class: "sub-actions" }, [
    actionButton({ class: "btn-link", type: "button" }, "結果をHTMLで保存", exportSessionHTML),
    actionButton({ class: "btn-link", type: "button" }, "単語帳で確認", () => {
      wbState.catId = CATEGORIES.some(c => c.id === state.selectedCategory) ? state.selectedCategory : "all";
      wbState.search = "";
      showScreen("wordbook");
    }),
  ]);
  root.appendChild(subActions);

  showScreen("result");
}

// ============================================================
// テーマ
// ============================================================
// サン / ムーンの SVG アイコン。クリックで切り替わる先を視覚化する:
// - 現在 light → 月アイコン（クリックで dark に切り替え）
// - 現在 dark  → 太陽アイコン（クリックで light に切り替え）
const SUN_ICON_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2L12 4"/><path d="M12 20L12 22"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/></svg>';

// 音声読み上げ（Web Speech API）
const SPEAKER_ICON_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';

const ttsAvailable = typeof window !== "undefined" && "speechSynthesis" in window && typeof SpeechSynthesisUtterance !== "undefined";

// 利用可能な英語音声から最も自然なものを選ぶ。
// 音声は OS / ブラウザ依存で品質に大きく差があり、espeak のような合成は非自然なため、
// より自然な Google / Apple / Microsoft の声を優先して選択する。
let selectedVoice = null;

const pickBestVoice = () => {
  if (!ttsAvailable) return null;
  const voices = window.speechSynthesis.getVoices() ?? [];
  if (!voices.length) return null;

  // 優先順（上から順に最初に見つかったものを採用）
  const preferences = [
    v => v.name === "Google US English",
    v => v.name === "Google UK English Female",
    v => v.name === "Google UK English Male",
    v => /^Google /.test(v.name) && /^en/i.test(v.lang),
    v => v.name === "Samantha" && /^en/i.test(v.lang),
    v => v.name === "Alex" && /^en/i.test(v.lang),
    v => v.name === "Daniel" && /^en/i.test(v.lang),
    v => v.name === "Karen" && /^en/i.test(v.lang),
    v => /Microsoft.*(Aria|Jenny|Guy|Davis|Tony|Nancy)/i.test(v.name) && /^en/i.test(v.lang),
    v => /Microsoft.*(Zira|David|Mark|Hazel)/i.test(v.name) && /^en/i.test(v.lang),
    v => /^en-US/i.test(v.lang) && v.localService === false,   // クラウド合成（高品質寄り）
    v => /^en/i.test(v.lang) && v.localService === false,
    v => /^en-US/i.test(v.lang),
    v => /^en-GB/i.test(v.lang),
    v => /^en/i.test(v.lang),
  ];

  for (const pred of preferences) {
    const match = voices.find(pred);
    if (match) return match;
  }
  return null;
}

const refreshSelectedVoice = () => {
  selectedVoice = pickBestVoice();
}

// 音声リストは非同期で読み込まれることがあるため、voiceschanged で再選択する
if (ttsAvailable) {
  refreshSelectedVoice();
  if ("onvoiceschanged" in window.speechSynthesis) {
    window.speechSynthesis.addEventListener("voiceschanged", refreshSelectedVoice);
  }
}

const speakWord = (word) => {
  if (!ttsAvailable || !word) return;
  try {
    window.speechSynthesis.cancel();
    if (!selectedVoice) refreshSelectedVoice();
    const u = new SpeechSynthesisUtterance(word);
    if (selectedVoice) {
      u.voice = selectedVoice;
      u.lang = selectedVoice.lang;
    } else {
      u.lang = "en-US";
    }
    u.rate = 0.95;
    u.pitch = 1.0;
    u.volume = 1.0;
    window.speechSynthesis.speak(u);
  } catch (e) {
  }
}

const playQuestionAudioOnce = (q) => {
  if (!q?.word) return;
  const key = `${state.currentIdx}:${q.kind}:${q.word}:${q.answer}`;
  if (state.autoSpokenQuestionKey === key) return;
  state.autoSpokenQuestionKey = key;
  speakWord(q.word);
}

// 発音ボタンを生成（TTS未対応環境では null を返す）
const makeSpeakButton = (word, opts = {}) => {
  if (!ttsAvailable) return null;
  const btn = el("button", {
    class: "speak-btn" + (opts.size === "lg" ? " speak-btn-lg" : ""),
    type: "button",
    title: "発音を聞く",
    "aria-label": word + " の発音を聞く",
  });
  setSvgIcon(btn, SPEAKER_ICON_SVG);
  btn.addEventListener("click", (ev) => {
    ev.stopPropagation();
    speakWord(word);
  });
  return btn;
}
const MOON_ICON_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

const applyThemeUI = (theme) => {
  document.documentElement.setAttribute("data-theme", theme);
  const icon = byId("theme-icon");
  if (icon) setSvgIcon(icon, theme === "dark" ? SUN_ICON_SVG : MOON_ICON_SVG);
  const btn = byId("theme-toggle");
  if (btn) {
    const next = theme === "dark" ? "ライトモード" : "ダークモード";
    btn.setAttribute("title", next + "に切り替え");
    btn.setAttribute("aria-label", next + "に切り替え");
  }
}

const applyTheme = (theme) => {
  applyThemeUI(theme);
  dataCache.theme = theme;
  idbSet("theme", theme).catch(() => {});
}

const toggleTheme = () => {
  const current = document.documentElement.getAttribute("data-theme") ?? "light";
  applyTheme(current === "dark" ? "light" : "dark");
}

// ============================================================
// 初期化
// ============================================================
// ============================================================
// ユーザー名モーダル
// ============================================================
const refreshUserBtn = () => {
  const btn = byId("user-btn");
  const nameEl = byId("user-btn-name");
  if (!btn || !nameEl) return;
  if (dataCache.userName) {
    btn.classList.remove("hidden");
    nameEl.textContent = dataCache.userName + " さん";
  } else {
    btn.classList.add("hidden");
    nameEl.textContent = "";
  }
}

// 初回時の強制入力モード or 編集モードでモーダルを開く
const openUserModal = (opts) => {
  const required = Boolean(opts?.required);
  const modal = byId("user-modal");
  const input = byId("user-name-input");
  const cancelBtn = byId("user-modal-cancel");
  const title = byId("user-modal-title");
  const desc = byId("user-modal-desc");
  if (!modal || !input) return;
  input.value = dataCache.userName ?? "";
  if (required) {
    title.textContent = "お名前の登録";
    desc.replaceChildren(
      "結果の HTML エクスポートに記載する名前です。",
      document.createElement("br"),
      "後から変更できます。"
    );
    cancelBtn.hidden = true;
  } else {
    title.textContent = "お名前の変更";
    desc.textContent = "結果の HTML エクスポートに記載する名前を変更します。";
    cancelBtn.hidden = false;
  }
  modal.classList.remove("hidden");
  setTimeout(() => input.focus(), 30);
}
const closeUserModal = () => {
  const modal = byId("user-modal");
  if (modal) modal.classList.add("hidden");
}

// 共通通知モーダル
const showNotice = (body, title) => {
  const modal = byId("notice-modal");
  const t = byId("notice-modal-title");
  const b = byId("notice-modal-body");
  if (!modal || !b) return;
  t.textContent = title || "お知らせ";
  b.textContent = body ?? "";
  modal.classList.remove("hidden");
  setTimeout(() => {
    const ok = byId("notice-modal-ok");
    if (ok) ok.focus();
  }, 30);
}
const closeNotice = () => {
  const modal = byId("notice-modal");
  if (modal) modal.classList.add("hidden");
}

let confirmResolve = null;
let confirmReturnFocus = null;

const closeConfirm = (confirmed = false) => {
  const modal = byId("confirm-modal");
  if (modal) modal.classList.add("hidden");
  const resolve = confirmResolve;
  confirmResolve = null;
  if (resolve) resolve(Boolean(confirmed));
  if (confirmReturnFocus instanceof HTMLElement) {
    setTimeout(() => confirmReturnFocus?.focus(), 0);
  }
  confirmReturnFocus = null;
}

// 共通確認モーダル
const showConfirm = (opts = {}) => {
  const modal = byId("confirm-modal");
  const title = byId("confirm-modal-title");
  const body = byId("confirm-modal-body");
  const ok = byId("confirm-modal-ok");
  const cancel = byId("confirm-modal-cancel");
  if (!modal || !title || !body || !ok || !cancel) return Promise.resolve(false);

  if (confirmResolve) closeConfirm(false);

  title.textContent = opts.title || "確認";
  body.textContent = opts.body ?? "";
  ok.textContent = opts.confirmLabel || "OK";
  cancel.textContent = opts.cancelLabel || "キャンセル";
  ok.classList.toggle("btn-danger", opts.danger === true);
  ok.classList.toggle("btn-primary", opts.danger !== true);

  confirmReturnFocus = document.activeElement instanceof HTMLElement ? document.activeElement : null;
  modal.classList.remove("hidden");
  setTimeout(() => cancel.focus(), 30);

  return new Promise(resolve => {
    confirmResolve = resolve;
  });
}

const isModalVisible = (id) => {
  const modal = byId(id);
  return Boolean(modal && !modal.classList.contains("hidden"));
}

const isAnyModalOpen = () => (
  isModalVisible("user-modal") ||
  isModalVisible("notice-modal") ||
  isModalVisible("confirm-modal")
);

const init = async () => {
  // デフォルトはライト固定。OS設定は採用せず、利用者が切替を保存した場合のみその設定を適用する。
  applyThemeUI("light");

  await loadAllFromIDB();

  applyThemeUI(dataCache.theme ?? "light");

  showScreen("home");
  refreshUserBtn();

  // 初回または2週間経過でリセットされた場合 → 強制でユーザー名入力モーダル
  if (!dataCache.userName) {
    openUserModal({ required: true });
  }

  byId("theme-toggle").addEventListener("click", toggleTheme);
  byId("nav-home").addEventListener("click", () => showScreen("home"));
  byId("nav-wordbook").addEventListener("click", () => showScreen("wordbook"));

  // ユーザー名ボタン → 編集モーダル
  byId("user-btn").addEventListener("click", () => openUserModal({ required: false }));

  // モーダル: 保存
  byId("user-modal-save").addEventListener("click", async () => {
    const input = byId("user-name-input");
    const value = (input?.value ?? "").trim();
    if (!value) {
      input.focus();
      return;
    }
    await saveUserName(value);
    refreshUserBtn();
    closeUserModal();
  });
  // モーダル: キャンセル
  byId("user-modal-cancel").addEventListener("click", () => {
    if (!dataCache.userName) return; // 初回はキャンセル不可
    closeUserModal();
  });
  // モーダル: Enterで保存。IME変換中のEnterは変換確定として扱う。
  const userNameInput = byId("user-name-input");
  const USER_NAME_COMPOSITION_GUARD_MS = 100;
  let userNameInputComposing = false;
  let userNameCompositionEndedAt = 0;
  const isUserNameComposing = (e) => (
    e.isComposing ||
    userNameInputComposing ||
    e.key === "Process" ||
    e.keyCode === 229 ||
    performance.now() - userNameCompositionEndedAt < USER_NAME_COMPOSITION_GUARD_MS
  );
  userNameInput.addEventListener("compositionstart", () => {
    userNameInputComposing = true;
  });
  userNameInput.addEventListener("compositionend", () => {
    userNameInputComposing = false;
    userNameCompositionEndedAt = performance.now();
  });
  userNameInput.addEventListener("keydown", (e) => {
    e.stopPropagation();
    if (isUserNameComposing(e)) return;
    if (e.key === "Enter") {
      e.preventDefault();
      byId("user-modal-save").click();
    } else if (e.key === "Escape") {
      if (dataCache.userName) closeUserModal();
    }
  });

  // 通知モーダル: OK / Esc / 背景クリックで閉じる
  byId("notice-modal-ok").addEventListener("click", closeNotice);
  byId("notice-modal").addEventListener("click", (e) => {
    if (e.target.id === "notice-modal") closeNotice();
  });
  // 確認モーダル: ボタン / Esc / 背景クリックで閉じる
  byId("confirm-modal-ok").addEventListener("click", () => closeConfirm(true));
  byId("confirm-modal-cancel").addEventListener("click", () => closeConfirm(false));
  byId("confirm-modal").addEventListener("click", (e) => {
    if (e.target.id === "confirm-modal") closeConfirm(false);
  });
  document.addEventListener("keydown", (e) => {
    const noticeOpen = !byId("notice-modal").classList.contains("hidden");
    if (noticeOpen && (e.key === "Escape" || e.key === "Enter")) {
      e.preventDefault();
      e.stopImmediatePropagation();
      closeNotice();
      return;
    }
    const confirmOpen = !byId("confirm-modal").classList.contains("hidden");
    if (confirmOpen && e.key === "Escape") {
      e.preventDefault();
      e.stopImmediatePropagation();
      closeConfirm(false);
    }
  });

  document.addEventListener("keydown", (e) => {
    if (isAnyModalOpen()) return;
    const quizVisible = !byId("screen-quiz").classList.contains("hidden");
    if (!quizVisible) return;
    if (e.key >= "1" && e.key <= "4") {
      const idx = Number.parseInt(e.key, 10) - 1;
      if (state.awaitingNext) return;
      const $buttons = qsa("#quiz-content .choice");
      if ($buttons[idx]) $buttons[idx].click();
    } else if (e.key === "5") {
      const q = state.questions[state.currentIdx];
      if (q?.word) speakWord(q.word);
    } else if (e.key === "Enter" && state.awaitingNext) {
      e.preventDefault();
      goNext();
    }
  });
}

window.MustDevEigo = {
  Data: { DATA, CATEGORIES, getCategorySource },
  Quiz: { state, startQuiz, startMistakeQuiz, buildQuestion },
  Storage: { dataCache, openDB, idbGet, idbSet, idbDelete, loadAllFromIDB },
  UI: { showScreen, renderHome, renderWordbook, renderQuestion },
  App: { init },
};

document.addEventListener("DOMContentLoaded", () => {
  init();
});
</script>
